<!DOCTYPE html>
<html>
<head>
    <title>Payroll Admin Login</title>
</head>
<body>

    <h1>Payroll System Login</h1>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <p>{{ message }}</p>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">

        <label>Username</label><br>
        <input
            type="text"
            name="username"
            required>

        <br><br>

        <label>Password</label><br>
        <input
            type="password"
            name="password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</body>
</html>
